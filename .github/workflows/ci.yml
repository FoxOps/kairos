name: CI

# Deliberately not triggered on every push/PR: GitHub Actions minutes are
# metered and billed on a private repository past the free monthly quota,
# so this only runs at moments that actually need a full verification -
# right before a release is published (tag push), once a week (catches
# dependencies that turn vulnerable without any code change), or on
# demand. See workflow_dispatch below to run it manually from the
# Actions tab.
on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 3 * * 1" # every Monday, 03:00 UTC
  workflow_dispatch: {}

env:
  DATABASE_URL: "sqlite:///:memory:"
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install -r docker/requirements.txt
      - run: pytest tests/ -v --tb=short --junitxml=junit.xml --cov=app --cov-report=term-missing
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-results
          path: junit.xml

  # New/not yet proven stable in CI - reports its results without blocking
  # the workflow. Remove continue-on-error once confirmed stable across a
  # few runs (same rationale the previous GitLab job had for
  # allow_failure: true).
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: mcr.microsoft.com/playwright/python:v1.61.0-jammy
    steps:
      - uses: actions/checkout@v7
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-e2e.txt
      - run: pytest tests/e2e/test_browser_flows.py -v --tb=short --junitxml=junit-e2e.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-e2e-results
          path: junit-e2e.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install -r docker/requirements.txt
      - run: ruff check . --config=.ruff.toml
      - run: mypy app/ tests/ --ignore-missing-imports --allow-untyped-decorators
      - run: black --check . --exclude=".git|__pycache__|instance|venv"

  # bandit and pip-audit both run without a continue-on-error: neither
  # needs an external service/auth (pip-audit queries PyPI/OSV
  # anonymously), so a real finding fails the workflow like any other
  # check.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install -r docker/requirements.txt
      - run: bandit -r app/ -f json -o bandit-report.json
      - run: pip-audit -r requirements.txt -f json -o pip-audit-report.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # Builds and pushes the Docker image to the GitHub Container Registry -
  # only on an actual version tag push (never on the weekly schedule or a
  # manual workflow_dispatch, which have no tag to name the image after),
  # and only once the other 3 jobs pass (never publish a broken image).
  # Closes the gap documented in Docs/deployment/docker.md: previously no
  # CI job published this image anywhere, so KAIROS_IMAGE had to be built
  # and pushed by hand before docker-compose.example.yml could pull it.
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # ghcr.io requires a lowercase path - github.repository_owner
          # is "FoxOps" (mixed case) and GitHub Actions expressions have
          # no built-in lower() function, so this is hardcoded rather
          # than derived, matching ghcr.io/foxops/kairos already used
          # throughout Docs/deployment/docker.md and both .env.example
          # files.
          tags: |
            ghcr.io/foxops/kairos:${{ github.ref_name }}
            ghcr.io/foxops/kairos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
