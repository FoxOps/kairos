name: CI Pipeline

on:
  push:
    branches: [ main, develop, "**" ]
  pull_request:
    branches: [ main, develop, "**" ]

jobs:
  test:
    name: Tests
    uses: ./.github/workflows/python-test.yml

  lint:
    name: Linting
    uses: ./.github/workflows/code-quality.yml

  security:
    name: Security Scan
    uses: ./.github/workflows/security-scan.yml
