name: Code Quality

on:
  workflow_call:
  push:
    branches: [ main, develop, "**" ]
  pull_request:
    branches: [ main, develop, "**" ]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run Ruff linter
        run: |
          ruff check . --config=.ruff.toml 2>&1 || true

      - name: Run mypy type checking
        run: |
          mypy app/ tests/ --ignore-missing-imports --allow-untyped-decorators 2>&1 || true

  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Check code formatting with Black
        run: |
          black --check . --exclude=".git|__pycache__|instance|venv" 2>&1 || true
