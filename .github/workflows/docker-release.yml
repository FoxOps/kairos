name: Docker Release

# Manual only, deliberately - never triggered by a tag push or by CI
# completing. Run from the Actions tab (or `gh workflow run
# docker-release.yml --ref v1.0.0-rc1`), picking the tag/branch to build
# from in the "Use workflow from" selector. Run `ci.yml` (or check it
# already passed for that ref) yourself first - this workflow does not
# verify that on its own.
on:
  workflow_dispatch: {}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # ghcr.io requires a lowercase path - github.repository_owner
          # is "FoxOps" (mixed case) and GitHub Actions expressions have
          # no built-in lower() function, so this is hardcoded rather
          # than derived, matching ghcr.io/foxops/kairos already used
          # throughout Docs/deployment/docker.md and both .env.example
          # files.
          tags: |
            ghcr.io/foxops/kairos:${{ github.ref_name }}
            ghcr.io/foxops/kairos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
