name: Docker Release

# Manual only, deliberately - never triggered by a tag push or by the
# Tests workflow completing. Run from the Actions tab (or `gh workflow
# run docker-release.yml --ref v1.0.0-rc1`), picking the tag/branch to
# build from in the "Use workflow from" selector. Run `tests.yml` (or
# check it already passed for that ref) yourself first - this workflow
# does not verify that on its own.
on:
  workflow_dispatch: {}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      # github.ref_name is whatever branch/tag was picked in the "Use
      # workflow from" selector - since this workflow can be run from
      # any ref (not just a version tag), that's not reliably a version
      # number (e.g. "main"). Read the real app version straight from
      # the source of truth instead (app/utils/health.py's
      # APP_VERSION_DEFAULT, the same fallback /version and the footer
      # use at runtime when APP_VERSION isn't set in the environment).
      - name: Extract app version
        id: version
        run: |
          version=$(grep -oP '(?<=APP_VERSION_DEFAULT = ")[^"]+' app/utils/health.py)
          if [ -z "$version" ]; then
            echo "Could not extract APP_VERSION_DEFAULT from app/utils/health.py" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # ghcr.io requires a lowercase path - github.repository_owner
          # is "FoxOps" (mixed case) and GitHub Actions expressions have
          # no built-in lower() function, so this is hardcoded rather
          # than derived, matching ghcr.io/foxops/kairos already used
          # throughout Docs/deployment/docker.md and both .env.example
          # files.
          tags: |
            ghcr.io/foxops/kairos:${{ steps.version.outputs.version }}
            ghcr.io/foxops/kairos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
