name: Docker Release

# Manual only, deliberately - never triggered by a tag push. Run from
# the Actions tab (or `gh workflow run docker-release.yml --ref main`),
# picking the branch/tag to build from in the "Use workflow from"
# selector - always "main", enforced by the require-main job below.
# Actually calls tests.yml (workflow_call) and only builds/pushes if it
# passes - not just a "run that first yourself" note.
on:
  workflow_dispatch: {}

jobs:
  # main is the only source of truth for a release - dev branches (e.g.
  # 1.0.0-RC2) merge into it before a release build happens, never the
  # other way around. Fails loudly rather than silently skipping, so
  # whoever triggered this from the wrong ref in the "Use workflow from"
  # selector gets a clear reason instead of a job that just didn't run.
  # Runs before the tests below too, so a wrong ref fails fast instead
  # of burning CI minutes on a full test run that was never going to be
  # allowed to build anyway.
  require-main:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::docker-release.yml must be run from main (got '${{ github.ref_name }}'). Merge into main first, then re-run this workflow with 'main' selected in 'Use workflow from'." >&2
          exit 1

  run-tests:
    needs: require-main
    uses: ./.github/workflows/tests.yml

  docker-build-push:
    needs: run-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      # Read the real app version straight from the source of truth
      # (app/utils/health.py's APP_VERSION_DEFAULT, the same fallback
      # /version and the footer use at runtime when APP_VERSION isn't
      # set in the environment) rather than deriving it from the ref -
      # github.ref_name is always "main" at this point anyway (enforced
      # by require-main above), which wouldn't be a version number.
      - name: Extract app version
        id: version
        run: |
          version=$(grep -oP '(?<=APP_VERSION_DEFAULT = ")[^"]+' app/utils/health.py)
          if [ -z "$version" ]; then
            echo "Could not extract APP_VERSION_DEFAULT from app/utils/health.py" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # ghcr.io requires a lowercase path - github.repository_owner
          # is "FoxOps" (mixed case) and GitHub Actions expressions have
          # no built-in lower() function, so this is hardcoded rather
          # than derived, matching ghcr.io/foxops/kairos already used
          # throughout Docs/deployment/docker.md and both .env.example
          # files.
          tags: |
            ghcr.io/foxops/kairos:${{ steps.version.outputs.version }}
            ghcr.io/foxops/kairos:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
