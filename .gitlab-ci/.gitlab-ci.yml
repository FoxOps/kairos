# Configuration CI/CD pour Leviia Schedule
# Compatible avec GitLab CI/CD
# https://docs.gitlab.com/ee/ci/

stages:
  - test
  - lint
  - security
  - build

# Variables globales
variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DATABASE_URL: "sqlite:///:memory:"

# Cache pour pip
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .venv/

# Template pour les jobs Python
.python-template:
  image: python:$PYTHON_VERSION-slim
  before_script:
    - python -V
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install -r docker/requirements.txt

# Job: Tests unitaires
run_tests:
  extends: .python-template
  stage: test
  script:
    - echo "Running pytest..."
    - pytest tests/ -v --tb=short --junitxml=junit.xml --cov=app --cov-report=term-missing
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
  coverage: '/^TOTAL.*\s+(\d+%)$/'

# Job: Tests E2E navigateur réel (Playwright)
# allow_failure: true tant que ce job est nouveau/pas encore éprouvé en CI -
# il tourne et remonte ses résultats sans bloquer le pipeline. À retirer une
# fois la stabilité confirmée sur quelques pipelines. Image officielle
# Playwright (contient déjà Chromium + toutes les libs système - évite le
# problème "playwright install --with-deps nécessite sudo" rencontré en dev).
run_e2e_browser:
  image: mcr.microsoft.com/playwright/python:v1.61.0-jammy
  stage: test
  allow_failure: true
  before_script:
    - pip install -r requirements.txt
    - pip install -r requirements-e2e.txt
  script:
    - echo "Running Playwright E2E tests..."
    - pytest tests/e2e/test_browser_flows.py -v --tb=short --junitxml=junit-e2e.xml
  artifacts:
    when: always
    reports:
      junit: junit-e2e.xml
    paths:
      - junit-e2e.xml

# Job: Linting avec Ruff. Blocking (no more `|| true`) - same commands as
# `make lint`/`make format-check`, so a green pipeline means the exact
# same guarantee a contributor already checked locally.
run_linting:
  extends: .python-template
  stage: lint
  script:
    - echo "Running ruff..."
    - ruff check . --config=.ruff.toml --output-file=ruff-report.txt
    - echo "Running mypy..."
    - mypy app/ tests/ --ignore-missing-imports --allow-untyped-decorators --html-report mypy-report
    - echo "Running black..."
    - black --check . --exclude=".git|__pycache__|instance|venv"
  artifacts:
    when: always
    paths:
      - ruff-report.txt
      - mypy-report/

# Job: Analyse de sécurité
# Tourne sur chaque pipeline (push/MR) déjà via `workflow.rules` plus bas,
# ce qui couvre l'essentiel. Pour un audit vraiment régulier indépendant des
# commits (dépendances qui deviennent vulnérables sans changement de code),
# créer un Scheduled Pipeline dans GitLab (CI/CD > Schedules, ex: quotidien)
# - $CI_PIPELINE_SOURCE == "schedule" est alors dispo pour cibler ce job
# seul si besoin. Pas configurable depuis ce fichier YAML (propriété du
# projet GitLab, pas du repo).
#
# bandit is blocking (no `|| true`): it needs no external service/auth,
# so a real finding must fail the pipeline like any other check. safety
# is a deliberate exception: `safety check` (the old command this job
# used to run) has been fully unsupported since May 2024, and its
# replacement, `safety scan`, requires either an interactive `safety
# auth login` or a $SAFETY_API_KEY (https://platform.safetycli.com) -
# neither is available in a fresh clone of this repo's CI. Confirmed by
# direct testing: `safety scan` with no key blocks on stdin waiting for
# a login prompt, which would hang every pipeline indefinitely rather
# than just report findings. The job below only runs it when
# $SAFETY_API_KEY is configured (CI/CD > Variables) and fails the
# pipeline on findings in that case; otherwise it skips with an explicit
# message instead of silently swallowing a broken command.
run_security:
  extends: .python-template
  stage: security
  script:
    - echo "Running bandit..."
    - bandit -r app/ -f json -o bandit-report.json
    - |
      if [ -n "$SAFETY_API_KEY" ]; then
        echo "Running safety..."
        safety scan --output json --save-as json safety-report.json
      else
        echo "SAFETY_API_KEY non configurée (CI/CD > Variables) - scan safety ignoré. Voir le commentaire de ce job."
      fi
  artifacts:
    when: always
    paths:
      - bandit-report.json
      - safety-report.json

# Job: Documentation
build_docs:
  extends: .python-template
  stage: build
  script:
    - echo "Building documentation..."
    - mkdir -p public/docs
    - cp -r Docs/* public/docs/
  artifacts:
    paths:
      - public/
  only:
    - main
    - tags

# Règles pour les branches
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH =~ /^feature/.*$
    - if: $CI_COMMIT_BRANCH =~ /^fix/.*$
    - if: $CI_COMMIT_BRANCH =~ /^release/.*$
    - if: $CI_MERGE_REQUEST_ID
