# Configuration CI/CD pour Leviia Schedule
# Compatible avec GitLab CI/CD
# https://docs.gitlab.com/ee/ci/

stages:
  - test
  - lint
  - security
  - build
  - deploy

# Variables globales
variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DATABASE_URL: "sqlite:///:memory:"

# Cache pour pip
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .venv/

# Template pour les jobs Python
.python-template:
  image: python:$PYTHON_VERSION-slim
  before_script:
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install -r docker/requirements.txt
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
    - pip install -r docker/requirements.txt

# Job: Tests unitaires
run_tests:
  extends: .python-template
  stage: test
  script:
    - echo "Running pytest..."
    - pytest tests/ -v --tb=short -x
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - test-results/
  coverage: '/^TOTAL.*\s+(\d+%)$/'

# Job: Linting avec Ruff
run_linting:
  extends: .python-template
  stage: lint
  script:
    - echo "Running ruff..."
    - ruff check app/ tests/ --output-file=ruff-report.txt || true
    - echo "Running mypy..."
    - mypy app/ --ignore-missing-imports --html-report mypy-report || true
    - echo "Running black..."
    - black --check app/ tests/ || true
  artifacts:
    when: always
    paths:
      - ruff-report.txt
      - mypy-report/

# Job: Analyse de sécurité
run_security:
  extends: .python-template
  stage: security
  script:
    - echo "Running bandit..."
    - bandit -r app/ -f json -o bandit-report.json || true
    - echo "Running safety..."
    - safety check --json -o safety-report.json || true
  artifacts:
    when: always
    paths:
      - bandit-report.json
      - safety-report.json

# Job: Build Docker
build_docker:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:latest -f docker/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:latest
    - echo "Building with version tag..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -f docker/Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - tags

# Job: Déploiement (exemple pour Kubernetes)
deploy_production:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" > ~/.kube/config
    - kubectl cluster-info
  script:
    - echo "Deploying to production..."
    - kubectl apply -f k8s/
    - kubectl rollout status deployment/leviia-schedule -n production --timeout=60s
  environment:
    name: production
    url: https://schedule.yourdomain.com
  only:
    - main
  when: manual

# Job: Déploiement (exemple pour Docker Swarm)
deploy_swarm:
  stage: deploy
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Deploying to swarm..."
    - docker stack deploy -c docker-compose.prod.yml leviia-schedule
  environment:
    name: swarm
    url: https://schedule.yourdomain.com
  only:
    - main
  when: manual

# Job: Documentation
build_docs:
  extends: .python-template
  stage: build
  script:
    - echo "Building documentation..."
    - mkdir -p public/docs
    - cp -r docs/* public/docs/
  artifacts:
    paths:
      - public/
  only:
    - main
    - tags

# Règles pour les branches
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH =~ /^feature/.*$
    - if: $CI_COMMIT_BRANCH =~ /^fix/.*$
    - if: $CI_COMMIT_BRANCH =~ /^release/.*$
    - if: $CI_MERGE_REQUEST_ID
