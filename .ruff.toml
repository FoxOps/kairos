# Enable Pyflakes, pycodestyle, isort, and more
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "Q",   # flake8-quotes
    "T20", # flake8-print
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (handled by black)
    "S101",  # assert used (common in tests)
    "B008",  # do not perform function calls in argument defaults
]

# Line length (match black default)
line-length = 88

# Exclude files
exclude = [
    ".git",
    "__pycache__",
    "instance",
    "venv",
    "migrations",
]

[isort]
known-first-party = ["app", "tests"]

[per-file-ignores]
"tests/*" = ["S101", "S105"]  # Allow assert + fake test tokens/secrets in tests
"run.py" = ["T201"]  # Allow print in run.py
"app/routes/*" = ["B008"]  # Allow function calls in defaults for routes
