openapi: 3.0.3
info:
  title: Kairos API
  description: |
    Kairos's real JSON surface. The vast majority of the application's
    routes render server-side HTML (Jinja2) — only the routes listed
    here return JSON, plus the 3 ICS export endpoints (`text/calendar`).

    Documents only this internal API (`/api/*`, session cookie) - the
    spec for the public v1 API for third-party integrations
    (`/api/v1/*`, bearer token/service account) is generated
    automatically, not maintained here: see `GET /api/v1/openapi.json`
    and the "Public API v1" section of `API.md`.
  version: "1.0"
  license:
    name: CeCILL v2.1

servers:
  - url: http://localhost:5000
    description: Local development

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: >
        Flask-Login session (created by POST /login or the OIDC flow).
        Every route in this document requires an authenticated session
        unless stated otherwise (ICS export also accepts a bearer
        token as a query parameter).
    icsToken:
      type: apiKey
      in: query
      name: token
      description: >
        Bearer token (User.ics_token, generated via POST
        /profile/ics-token) allowing anonymous access to the 3
        /export/* endpoints — designed for external calendar
        subscriptions (Google Calendar, Outlook) that don't carry a
        session cookie.
  parameters:
    csrfHeader:
      name: X-CSRFToken
      in: header
      required: true
      description: >
        Required on every POST/PUT/PATCH/DELETE request (Flask-WTF
        CSRFProtect, active app-wide). Value read client-side from
        `<meta name="csrf-token">` in the server-rendered HTML.
      schema:
        type: string
  schemas:
    CalendarEvent:
      type: object
      description: Format consumed by FullCalendar (shifts, on-calls, leaves merged together).
      properties:
        id: { type: string, example: "shift-42" }
        title: { type: string, example: "Alice Martin - Morning" }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        className: { type: string, enum: [fc-event-shift, fc-event-oncall, fc-event-leave] }
        allDay: { type: boolean, description: "Present (true) only for leaves" }
        extendedProps:
          type: object
          properties:
            type: { type: string, enum: [shift, oncall, leave] }
            resourceId: { type: integer, description: "Real id of the underlying Shift/OnCall/Leave record" }
    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string }
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
    ShiftType:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        label: { type: string }
        start_hour: { type: integer, minimum: 0, maximum: 23 }
        end_hour: { type: integer, minimum: 0, maximum: 23 }

paths:
  /api/shifts:
    get:
      summary: List calendar events (shifts + on-calls + leaves)
      description: >
        Despite the name, does not return only shifts: aggregates
        shifts, on-calls, and leaves for the requested range, in the
        format FullCalendar expects. FullCalendar itself uses this as
        its dynamic events source, requesting whatever range is
        currently visible.
      operationId: getCalendarEvents
      parameters:
        - name: start
          in: query
          required: false
          description: >
            ISO date/datetime. Falls back to a ±180-day window around
            today if omitted, unparseable, reversed relative to `end`,
            or the resulting span exceeds 730 days.
          schema: { type: string, format: date-time }
        - name: end
          in: query
          required: false
          description: ISO date/datetime - see `start`.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CalendarEvent" }
    post:
      summary: Create a shift (FullCalendar drag & drop)
      operationId: createShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, shiftTypeId, start]
              properties:
                userId: { type: integer }
                shiftTypeId: { type: integer }
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optional, defaults to start" }
      responses:
        "200":
          description: Shift created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      shift:
                        type: object
                        properties:
                          id: { type: integer }
                          title: { type: string }
                          start: { type: string, format: date-time }
                          end: { type: string, format: date-time }
                          className: { type: string }
                          userId: { type: integer }
                          shiftTypeId: { type: integer }
        "400":
          description: >
            Missing data, invalid date format, weekend
            (shifts cannot be created on Saturday/Sunday),
            or a conflict detected (the user already has a shift that day)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403":
          description: Not an admin
        "404":
          description: User or shift type not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/shifts/{shiftId}:
    parameters:
      - name: shiftId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Move/resize a shift (drag & drop)
      operationId: updateShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optional: keeps the original duration if absent" }
      responses:
        "200": { description: Shift updated }
        "400":
          description: Invalid date, weekend, or conflict with an existing shift
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "404": { description: Shift not found }
    delete:
      summary: Delete a shift
      operationId: deleteShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Deleted }
        "404": { description: Shift not found }

  /api/users:
    get:
      summary: List users visible for the schedule
      description: >
        An admin sees every user on the schedule; a regular user only
        sees themselves (UserService.visible_users_for_schedule).
      operationId: listUsers
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /api/shift-types:
    get:
      summary: List shift types
      operationId: listShiftTypes
      responses:
        "200":
          description: List of shift types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShiftType" }

  /api/oncall/{oncallId}:
    parameters:
      - name: oncallId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Move an on-call shift (admin only)
      operationId: updateOncall
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time, description: "Must fall on a Friday" }
                end: { type: string, format: date-time }
      responses:
        "200": { description: On-call shift updated }
        "400":
          description: "Not a Friday, or conflict with an existing on-call shift"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403": { description: Not an admin }
        "404": { description: On-call shift not found }
    delete:
      summary: Delete an on-call shift (admin only)
      operationId: deleteOncall
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Deleted }
        "403": { description: Not an admin }
        "404": { description: On-call shift not found }

  /api/leave/{leaveId}:
    parameters:
      - name: leaveId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Change the dates of a leave
      description: >
        Accessible to any logged-in user, but restricted to their own
        leaves (403 otherwise) unless they're an admin.
      operationId: updateLeave
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optional: keeps the original duration if absent" }
      responses:
        "200": { description: Leave updated }
        "400":
          description: Invalid date or conflict with an existing leave
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403": { description: "Attempted to modify another user's leave (non-admin)" }
        "404": { description: Leave not found }
    delete:
      summary: Delete a leave
      description: Accessible to any logged-in user for their own leaves (or an admin for any).
      operationId: deleteLeave
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Deleted }
        "403": { description: "Attempted to delete another user's leave (non-admin)" }
        "404": { description: Leave not found }

  /export/shifts:
    get:
      summary: ICS export of shifts
      operationId: exportShifts
      security:
        - sessionCookie: []
        - icsToken: []
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          description: "Required if not authenticated by session (User.ics_token)"
          schema: { type: string }
      responses:
        "200":
          description: ICS file
          content:
            text/calendar:
              schema: { type: string }
        "401":
          description: "Neither a session nor a valid token (401 response for JSON/calendar clients, redirect to /login otherwise)"

  /export/oncall:
    get:
      summary: ICS export of on-call shifts
      operationId: exportOncall
      security: [{ sessionCookie: [] }, { icsToken: [] }]
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ICS file
          content:
            text/calendar:
              schema: { type: string }
        "401": { description: "Neither a session nor a valid token" }

  /export/leaves:
    get:
      summary: ICS export of leaves
      operationId: exportLeaves
      security: [{ sessionCookie: [] }, { icsToken: [] }]
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: ICS file
          content:
            text/calendar:
              schema: { type: string }
        "401": { description: "Neither a session nor a valid token" }
