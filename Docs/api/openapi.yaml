openapi: 3.0.3
info:
  title: Kairos API
  description: |
    Surface JSON réelle de Kairos. La grande majorité des routes
    de l'application rendent du HTML côté serveur (Jinja2) — seules les
    routes listées ici renvoient du JSON, plus les 3 endpoints d'export
    ICS (`text/calendar`).

    Écrit et vérifié contre le code réel en Phase 5 (2026-07), après
    audit qui a montré que l'ancienne documentation API décrivait des
    routes qui n'ont jamais existé (`/leaves/my-leaves`,
    `/admin/users/generate-token/<id>`, etc.) et omettait la plupart des
    endpoints `/api/*` réels.

    Documente uniquement cette API interne (`/api/*`, cookie de
    session) - la spec de l'API publique v1 pour intégrations tierces
    (`/api/v1/*`, jeton bearer/compte de service) est générée
    automatiquement, pas maintenue ici : voir `GET /api/v1/openapi.json`
    et la section "API publique v1" de `API.md`.
  version: "1.0"
  license:
    name: CeCILL v2.1

servers:
  - url: http://localhost:5000
    description: Développement local

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: >
        Session Flask-Login (créée par POST /login ou le flux OIDC).
        Toutes les routes de ce document nécessitent une session
        authentifiée sauf mention contraire (export ICS accepte aussi un
        token porteur en paramètre de requête).
    icsToken:
      type: apiKey
      in: query
      name: token
      description: >
        Token porteur (User.ics_token, généré via POST /profile/ics-token)
        permettant l'accès anonyme aux 3 endpoints /export/* — pensé pour
        les abonnements calendrier externes (Google Calendar, Outlook)
        qui ne portent pas de cookie de session.
  parameters:
    csrfHeader:
      name: X-CSRFToken
      in: header
      required: true
      description: >
        Requis sur toute requête POST/PUT/PATCH/DELETE (Flask-WTF
        CSRFProtect, actif app-wide). Valeur lue côté client depuis
        `<meta name="csrf-token">` dans le HTML rendu par le serveur.
      schema:
        type: string
  schemas:
    CalendarEvent:
      type: object
      description: Format consommé par FullCalendar (shifts, astreintes, congés fusionnés).
      properties:
        id: { type: string, example: "shift-42" }
        title: { type: string, example: "Alice Martin - Matin" }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        className: { type: string, enum: [fc-event-shift, fc-event-oncall, fc-event-leave] }
        allDay: { type: boolean, description: "Présent (true) uniquement pour les congés" }
        extendedProps:
          type: object
          properties:
            type: { type: string, enum: [shift, oncall, leave] }
            resourceId: { type: integer, description: "ID réel de l'enregistrement Shift/OnCall/Leave" }
    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string }
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
    ShiftType:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        label: { type: string }
        start_hour: { type: integer, minimum: 0, maximum: 23 }
        end_hour: { type: integer, minimum: 0, maximum: 23 }

paths:
  /api/shifts:
    get:
      summary: Liste des événements calendrier (shifts + astreintes + congés)
      description: >
        Malgré le nom, ne renvoie pas que des shifts : agrège shifts,
        astreintes et congés sur une fenêtre de ±180 jours autour
        d'aujourd'hui, au format attendu par FullCalendar.
      operationId: getCalendarEvents
      responses:
        "200":
          description: Liste d'événements
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CalendarEvent" }
    post:
      summary: Créer un shift (glisser-déposer FullCalendar)
      operationId: createShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, shiftTypeId, start]
              properties:
                userId: { type: integer }
                shiftTypeId: { type: integer }
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optionnel, sinon = start" }
      responses:
        "200":
          description: Shift créé
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      shift:
                        type: object
                        properties:
                          id: { type: integer }
                          title: { type: string }
                          start: { type: string, format: date-time }
                          end: { type: string, format: date-time }
                          className: { type: string }
                          userId: { type: integer }
                          shiftTypeId: { type: integer }
        "400":
          description: >
            Données manquantes, format de date invalide, week-end
            (les shifts ne peuvent pas être créés le samedi/dimanche),
            ou conflit détecté (l'utilisateur a déjà un shift ce jour-là)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403":
          description: Non-admin
        "404":
          description: Utilisateur ou type de shift introuvable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/shifts/{shiftId}:
    parameters:
      - name: shiftId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Déplacer/redimensionner un shift (glisser-déposer)
      operationId: updateShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optionnel : conserve la durée d'origine si absent" }
      responses:
        "200": { description: Shift mis à jour }
        "400":
          description: Date invalide, week-end, ou conflit avec un shift existant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "404": { description: Shift introuvable }
    delete:
      summary: Supprimer un shift
      operationId: deleteShift
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Supprimé }
        "404": { description: Shift introuvable }

  /api/users:
    get:
      summary: Liste des utilisateurs visibles pour le planning
      description: >
        Un admin voit tous les utilisateurs du planning ; un utilisateur
        normal ne se voit que lui-même (UserService.visible_users_for_schedule).
      operationId: listUsers
      responses:
        "200":
          description: Liste d'utilisateurs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /api/shift-types:
    get:
      summary: Liste des types de shift
      operationId: listShiftTypes
      responses:
        "200":
          description: Liste des types de shift
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShiftType" }

  /api/oncall/{oncallId}:
    parameters:
      - name: oncallId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Déplacer une astreinte (admin uniquement)
      operationId: updateOncall
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time, description: "Doit tomber un vendredi" }
                end: { type: string, format: date-time }
      responses:
        "200": { description: Astreinte mise à jour }
        "400":
          description: "Pas un vendredi, ou conflit avec une astreinte existante"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403": { description: Non-admin }
        "404": { description: Astreinte introuvable }
    delete:
      summary: Supprimer une astreinte (admin uniquement)
      operationId: deleteOncall
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Supprimée }
        "403": { description: Non-admin }
        "404": { description: Astreinte introuvable }

  /api/leave/{leaveId}:
    parameters:
      - name: leaveId
        in: path
        required: true
        schema: { type: integer }
    patch:
      summary: Modifier les dates d'un congé
      description: >
        Accessible à tout utilisateur connecté, mais restreint à ses
        propres congés (403 sinon) sauf pour un admin.
      operationId: updateLeave
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [start]
              properties:
                start: { type: string, format: date-time }
                end: { type: string, format: date-time, description: "Optionnel : conserve la durée d'origine si absent" }
      responses:
        "200": { description: Congé mis à jour }
        "400":
          description: Date invalide ou conflit avec un congé existant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403": { description: "Tentative de modifier le congé d'un autre utilisateur (non-admin)" }
        "404": { description: Congé introuvable }
    delete:
      summary: Supprimer un congé
      description: Accessible à tout utilisateur connecté pour ses propres congés (ou un admin pour tous).
      operationId: deleteLeave
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/csrfHeader"
      responses:
        "200": { description: Supprimé }
        "403": { description: "Tentative de supprimer le congé d'un autre utilisateur (non-admin)" }
        "404": { description: Congé introuvable }

  /export/shifts:
    get:
      summary: Export ICS des shifts
      operationId: exportShifts
      security:
        - sessionCookie: []
        - icsToken: []
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          description: "Requis si non authentifié par session (User.ics_token)"
          schema: { type: string }
      responses:
        "200":
          description: Fichier ICS
          content:
            text/calendar:
              schema: { type: string }
        "401":
          description: "Ni session ni token valide (réponse 401 pour clients JSON/calendrier, redirect /login sinon)"

  /export/oncall:
    get:
      summary: Export ICS des astreintes
      operationId: exportOncall
      security: [{ sessionCookie: [] }, { icsToken: [] }]
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Fichier ICS
          content:
            text/calendar:
              schema: { type: string }
        "401": { description: "Ni session ni token valide" }

  /export/leaves:
    get:
      summary: Export ICS des congés
      operationId: exportLeaves
      security: [{ sessionCookie: [] }, { icsToken: [] }]
      parameters:
        - name: scope
          in: query
          schema: { type: string, enum: [my, all], default: all }
        - name: token
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Fichier ICS
          content:
            text/calendar:
              schema: { type: string }
        "401": { description: "Ni session ni token valide" }
