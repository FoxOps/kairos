{% extends "base.html" %}

{% block title %}Ajouter un congé - Leviia Schedule{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-plus"></i> Ajouter un congé
        </h1>
        
        <form method="POST" action="{{ url_for('add_leave') }}">
            <div class="box">
                <div class="field">
                    <label class="label">Utilisateur</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="user_id" required>
                                <option value="" disabled selected>Sélectionnez un utilisateur</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label">Date de début</label>
                    <div class="control">
                        <input class="input" type="date" name="start_date" required>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label">Date de fin</label>
                    <div class="control">
                        <input class="input" type="date" name="end_date" required>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label">Raison (optionnel)</label>
                    <div class="control">
                        <textarea class="textarea" name="reason" placeholder="Ex: Congés payés, maladie, etc."></textarea>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">
                            <i class="fas fa-save"></i>&nbsp; Enregistrer
                        </button>
                        <a class="button is-light" href="{{ url_for('leave') }}">Annuler</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
