{% extends "base.html" %}

{% block title %}Ajouter un congé - Leviia Schedule{% endblock %}

{% block content %}
<section class="p-4 md:p-6 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">
        <i class="fas fa-plus" aria-hidden="true"></i> Ajouter un congé
    </h1>

    <form method="POST" action="{{ url_for('main.add_leave') }}" aria-labelledby="form-title">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card bg-base-100 shadow-md">
            <div class="card-body gap-4">
                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Utilisateur <span class="text-error">*</span></legend>
                    <select class="select w-full validator" id="user_id" name="user_id" required aria-required="true" aria-describedby="user-help">
                        <option value="" disabled selected>Sélectionnez un utilisateur</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-sm text-base-content/60" id="user-help">Sélectionnez l'utilisateur pour ce congé</p>
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Date de début <span class="text-error">*</span></legend>
                    <input class="input w-full validator" type="date" id="start_date" name="start_date" required aria-required="true" aria-describedby="start-date-help">
                    <p class="text-sm text-base-content/60" id="start-date-help">Date de début du congé</p>
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Date de fin <span class="text-error">*</span></legend>
                    <input class="input w-full validator" type="date" id="end_date" name="end_date" required aria-required="true" aria-describedby="end-date-help">
                    <p class="text-sm text-base-content/60" id="end-date-help">Date de fin du congé</p>
                </fieldset>

                <div class="flex gap-2" role="group" aria-label="Actions du formulaire">
                    <button class="btn btn-primary" type="submit" aria-label="Enregistrer le congé" title="Enregistrer le congé">
                        <i class="fas fa-save" aria-hidden="true"></i> Enregistrer
                    </button>
                    <a class="btn btn-ghost" href="{{ url_for('main.leave') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                        Annuler
                    </a>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
