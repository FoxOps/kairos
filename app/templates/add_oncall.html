{% extends "base.html" %}

{% block title %}Ajouter une astreinte - Leviia Schedule{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-plus" aria-hidden="true"></i> Ajouter une astreinte
        </h1>
        
        <form method="POST" action="{{ url_for('add_oncall') }}">
            <div class="box">
                <div class="field">
                    <label class="label required">Utilisateur</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="user_id" required aria-required="true">
                                <option value="" disabled selected>Sélectionnez un utilisateur</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label required">Date de début (vendredi)</label>
                    <div class="control">
                        <input class="input" type="date" name="start_date" required aria-required="true">
                    </div>
                    <p class="help">L'astreinte commence le vendredi à 21h et se termine le vendredi suivant à 07h.</p>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">
                            <i class="fas fa-save" aria-hidden="true"></i>&nbsp; Enregistrer
                        </button>
                        <a class="button is-light" href="{{ url_for('oncall') }}">Annuler</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
