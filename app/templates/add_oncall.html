{% extends "base.html" %}

{% block title %}Ajouter une astreinte - Leviia Schedule{% endblock %}

{% block content %}
<section class="p-4 md:p-6 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">
        <i class="fas fa-plus" aria-hidden="true"></i> Ajouter une astreinte
    </h1>

    <form method="POST" action="{{ url_for('main.add_oncall') }}" aria-labelledby="form-title">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card bg-base-100 shadow-md">
            <div class="card-body gap-4">
                <div>
                    <label class="label" for="user_id">Utilisateur <span class="text-error">*</span></label>
                    <select class="select w-full" id="user_id" name="user_id" required aria-required="true" aria-describedby="user-help">
                        <option value="" disabled selected>Sélectionnez un utilisateur</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-sm text-base-content/60" id="user-help">Sélectionnez l'utilisateur pour cette astreinte</p>
                </div>

                <div>
                    <label class="label" for="start_date">Date de début (vendredi) <span class="text-error">*</span></label>
                    <input class="input w-full" type="date" id="start_date" name="start_date" required aria-required="true" aria-describedby="start-date-help">
                    <p class="text-sm text-base-content/60" id="start-date-help">L'astreinte commence le vendredi à 21h et se termine le vendredi suivant à 07h.</p>
                </div>

                <div class="flex gap-2" role="group" aria-label="Actions du formulaire">
                    <button class="btn btn-primary" type="submit" aria-label="Enregistrer l'astreinte" title="Enregistrer l'astreinte">
                        <i class="fas fa-save" aria-hidden="true"></i> Enregistrer
                    </button>
                    <a class="btn btn-ghost" href="{{ url_for('main.oncall') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                        Annuler
                    </a>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
