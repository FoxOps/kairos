{% extends "base.html" %}

{% block title %}Ajouter une astreinte - Leviia Schedule{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-plus" aria-hidden="true"></i> Ajouter une astreinte
        </h1>
        
        <form method="POST" action="{{ url_for('main.add_oncall') }}" aria-labelledby="form-title">
            <div class="box">
                <div class="field">
                    <label class="label required" for="user_id">Utilisateur</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select id="user_id" name="user_id" required aria-required="true" aria-describedby="user-help">
                                <option value="" disabled selected>Sélectionnez un utilisateur</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <p class="help" id="user-help">Sélectionnez l'utilisateur pour cette astreinte</p>
                    </div>
                </div>
                
                <div class="field">
                    <label class="label required" for="start_date">Date de début (vendredi)</label>
                    <div class="control">
                        <input class="input" type="date" id="start_date" name="start_date" required aria-required="true" aria-describedby="start-date-help">
                    </div>
                    <p class="help" id="start-date-help">L'astreinte commence le vendredi à 21h et se termine le vendredi suivant à 07h.</p>
                </div>
                
                <div class="field">
                    <div class="control">
                        <div class="buttons" role="group" aria-label="Actions du formulaire">
                            <button class="button is-primary" type="submit" aria-label="Enregistrer l'astreinte" title="Enregistrer l'astreinte">
                                <i class="fas fa-save" aria-hidden="true"></i>&nbsp; Enregistrer
                            </button>
                            <a class="button is-light" href="{{ url_for('main.oncall') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                                Annuler
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
