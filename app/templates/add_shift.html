{% extends "base.html" %}

{% block title %}Ajouter un shift - Leviia Schedule{% endblock %}

{% block content %}
<section class="p-4 md:p-6 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">
        <i class="fas fa-plus" aria-hidden="true"></i> Ajouter un shift
    </h1>

    <form method="POST" action="{{ url_for('main.add_shift') }}" aria-labelledby="form-title">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card bg-base-100 shadow-md">
            <div class="card-body gap-4">
                <div>
                    <label class="label" for="user_id">Utilisateur <span class="text-error">*</span></label>
                    <select class="select w-full" id="user_id" name="user_id" required aria-required="true" aria-describedby="user-help">
                        <option value="" disabled selected>Sélectionner un utilisateur</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-sm text-base-content/60" id="user-help">Sélectionnez l'utilisateur pour ce shift</p>
                </div>

                <div>
                    <label class="label" for="shift_type_id">Type de shift <span class="text-error">*</span></label>
                    <select class="select w-full" id="shift_type_id" name="shift_type_id" required aria-required="true" aria-describedby="shift-type-help">
                        <option value="" disabled selected>Sélectionner un type</option>
                        {% for shift_type in shift_types %}
                        <option value="{{ shift_type.id }}">{{ shift_type.label }} ({{ shift_type.name }})</option>
                        {% endfor %}
                    </select>
                    <p class="text-sm text-base-content/60" id="shift-type-help">Sélectionnez le type de shift</p>
                </div>

                <!-- Période de dates -->
                <div>
                    <label class="label" for="start_date">Date de début <span class="text-error">*</span></label>
                    <input class="input w-full" type="date" id="start_date" name="start_date" required aria-required="true" aria-describedby="start-date-help">
                    <p class="text-sm text-base-content/60" id="start-date-help">Date de début du shift</p>
                </div>

                <div>
                    <label class="label" for="end_date">Date de fin <span class="text-error">*</span></label>
                    <input class="input w-full" type="date" id="end_date" name="end_date" required aria-required="true" aria-describedby="end-date-help">
                    <p class="text-sm text-base-content/60" id="end-date-help">Date de fin du shift</p>
                </div>

                <div class="flex gap-2" role="group" aria-label="Actions du formulaire">
                    <button class="btn btn-primary" type="submit" aria-label="Enregistrer le shift" title="Enregistrer le shift">
                        <i class="fas fa-save" aria-hidden="true"></i> Enregistrer
                    </button>
                    <a class="btn btn-ghost" href="{{ url_for('main.schedule') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                        Annuler
                    </a>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
