{% extends "base.html" %}

{% block title %}Ajouter un groupe - Leviia{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-plus" aria-hidden="true"></i> Ajouter un groupe
        </h1>
        
        <form method="POST" action="{{ url_for('add_group') }}">
            <div class="box">
                <div class="field">
                    <label class="label required">Nom du groupe</label>
                    <div class="control">
                        <input class="input" type="text" name="name" required aria-required="true" placeholder="Ex: Équipe A">
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_schedule" value="True">
                            Fait partie de Schedule (peut avoir des shifts)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_oncall" value="True">
                            Fait partie de l'astreinte (peut être en astreinte)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">
                            <i class="fas fa-save" aria-hidden="true"></i>&nbsp; Enregistrer
                        </button>
                        <a class="button is-light" href="{{ url_for('list_groups') }}">Annuler</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
