{% extends "base.html" %}

{% block title %}Ajouter un groupe - Leviia{% endblock %}

{% block content %}
<section class="p-4 md:p-6 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">
        <i class="fas fa-plus" aria-hidden="true"></i> Ajouter un groupe
    </h1>

    <form method="POST" action="{{ url_for('admin.add_group') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card bg-base-100 shadow-md">
            <div class="card-body gap-4">
                <div>
                    <label class="label">Nom du groupe <span class="text-error">*</span></label>
                    <input class="input w-full" type="text" name="name" required aria-required="true" placeholder="Ex: Équipe A">
                </div>

                <label class="label cursor-pointer justify-start gap-2">
                    <input type="checkbox" class="checkbox" name="is_part_of_schedule" value="True">
                    Fait partie de Schedule (peut avoir des shifts)
                </label>

                <label class="label cursor-pointer justify-start gap-2">
                    <input type="checkbox" class="checkbox" name="is_part_of_oncall" value="True">
                    Fait partie de l'astreinte (peut être en astreinte)
                </label>

                <div class="flex gap-2">
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-save" aria-hidden="true"></i> Enregistrer
                    </button>
                    <a class="btn btn-ghost" href="{{ url_for('admin.list_groups') }}">Annuler</a>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
