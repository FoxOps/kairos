{% extends "admin/base_admin.html" %}

{% block title %}Ajouter un utilisateur - Leviia{% endblock %}

{% block admin_content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-user-plus" aria-hidden="true"></i> Ajouter un utilisateur
        </h1>

        <form method="POST" action="{{ url_for('add_user') }}">
            <div class="box">
                <div class="field">
                    <label class="label required">Nom</label>
                    <div class="control">
                        <input class="input" type="text" name="name" required aria-required="true" placeholder="Ex: Jean Dupont">
                    </div>
                </div>

                <div class="field">
                    <label class="label required">Email</label>
                    <div class="control">
                        <input class="input" type="email" name="email" required aria-required="true" placeholder="Ex: jean.dupont@exemple.com">
                    </div>
                </div>

                <div class="field">
                    <label class="label required">Groupe</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="group_id" required aria-required="true">
                                <option value="" disabled selected>Sélectionner un groupe</option>
                                {% for group in groups %}
                                <option value="{{ group.id }}">{{ group.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Mot de passe</label>
                    <div class="control">
                        <input class="input" type="password" name="password" placeholder="Laisser vide pour un mot de passe par défaut">
                    </div>
                    <p class="help is-size-7">
                        Si vous ne spécifiez pas de mot de passe, un mot de passe par défaut sera généré (password123).
                    </p>
                </div>

                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">
                            <i class="fas fa-save" aria-hidden="true"></i>&nbsp; Enregistrer
                        </button>
                        <a class="button is-light" href="{{ url_for('list_users') }}">Annuler</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
