{% extends "admin/base_admin.html" %}

{% block title %}Modifier un groupe - Leviia{% endblock %}

{% block admin_content %}
<section class="p-3 md:p-4 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">
        <i class="fas fa-edit" aria-hidden="true"></i> Modifier un groupe
    </h1>

    <form method="POST" action="{{ url_for('admin.edit_group', group_id=group.id) }}" aria-labelledby="form-title">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card card-sm bg-base-100 shadow-md">
            <div class="card-body gap-4">
                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Nom du groupe <span class="text-error">*</span></legend>
                    <input class="input w-full validator" type="text" id="name" name="name" value="{{ group.name }}" required aria-required="true" aria-describedby="name-help">
                    <p class="text-sm text-base-content/60" id="name-help">Nom unique du groupe</p>
                </fieldset>

                <label class="label cursor-pointer justify-start gap-2">
                    <input type="checkbox" class="checkbox" name="is_part_of_schedule" value="True"
                           {% if group.is_part_of_schedule %}checked{% endif %}>
                    Fait partie de Schedule (peut avoir des shifts)
                </label>

                <label class="label cursor-pointer justify-start gap-2">
                    <input type="checkbox" class="checkbox" name="is_part_of_oncall" value="True"
                           {% if group.is_part_of_oncall %}checked{% endif %}>
                    Fait partie de l'astreinte (peut être en astreinte)
                </label>

                <div class="flex gap-2" role="group" aria-label="Actions du formulaire">
                    <button class="btn btn-primary" type="submit" aria-label="Enregistrer les modifications" title="Enregistrer les modifications">
                        <i class="fas fa-save" aria-hidden="true"></i> Enregistrer
                    </button>
                    <a class="btn btn-ghost" href="{{ url_for('admin.list_groups') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                        Annuler
                    </a>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
