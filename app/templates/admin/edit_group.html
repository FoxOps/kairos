{% extends "base.html" %}

{% block title %}Modifier un groupe - Leviia{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-edit"></i> Modifier un groupe
        </h1>
        
        <form method="POST" action="{{ url_for('edit_group', group_id=group.id) }}">
            <div class="box">
                <div class="field">
                    <label class="label">Nom du groupe</label>
                    <div class="control">
                        <input class="input" type="text" name="name" value="{{ group.name }}" required>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_schedule" value="True" 
                                   {% if group.is_part_of_schedule %}checked{% endif %}>
                            Fait partie de Schedule (peut avoir des shifts)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_oncall" value="True" 
                                   {% if group.is_part_of_oncall %}checked{% endif %}>
                            Fait partie de l'astreinte (peut être en astreinte)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">
                            <i class="fas fa-save"></i>&nbsp; Enregistrer
                        </button>
                        <a class="button is-light" href="{{ url_for('list_groups') }}">Annuler</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
