{% extends "admin/base_admin.html" %}

{% block title %}Modifier un groupe - Leviia{% endblock %}

{% block admin_content %}
<section class="section">
    <div class="container">
        <h1 class="title">
            <i class="fas fa-edit" aria-hidden="true"></i> Modifier un groupe
        </h1>
        
        <form method="POST" action="{{ url_for('admin.edit_group', group_id=group.id) }}" aria-labelledby="form-title">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="box">
                <div class="field">
                    <label class="label required" for="name">Nom du groupe</label>
                    <div class="control">
                        <input class="input" type="text" id="name" name="name" value="{{ group.name }}" required aria-required="true" aria-describedby="name-help">
                        <p class="help" id="name-help">Nom unique du groupe</p>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_schedule" value="True" 
                                   {% if group.is_part_of_schedule %}checked{% endif %}>
                            Fait partie de Schedule (peut avoir des shifts)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <label class="checkbox">
                            <input type="checkbox" name="is_part_of_oncall" value="True" 
                                   {% if group.is_part_of_oncall %}checked{% endif %}>
                            Fait partie de l'astreinte (peut être en astreinte)
                        </label>
                    </div>
                </div>
                
                <div class="field">
                    <div class="control">
                        <div class="buttons" role="group" aria-label="Actions du formulaire">
                            <button class="button is-primary" type="submit" aria-label="Enregistrer les modifications" title="Enregistrer les modifications">
                                <i class="fas fa-save" aria-hidden="true"></i>&nbsp; Enregistrer
                            </button>
                            <a class="button is-light" href="{{ url_for('admin.list_groups') }}" aria-label="Annuler et retourner à la liste" title="Annuler">
                                Annuler
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
