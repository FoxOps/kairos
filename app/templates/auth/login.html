{% extends "base.html" %}

{% block title %}Connexion - Leviia{% endblock %}

{% block content %}
<div class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-4">
                <div class="box">
                    <h1 class="title is-4 has-text-centered">Connexion</h1>
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="field">
                            <label class="label required" for="email">Email</label>
                            <div class="control has-icons-left">
                                <input class="input" type="email" id="email" name="email" 
                                       placeholder="votre@email.com" required autofocus aria-required="true">
                                <span class="icon is-small is-left">
                                    <i class="fas fa-envelope" aria-hidden="true"></i>
                                </span>
                            </div>
                        </div>
                        
                        <div class="field">
                            <label class="label required" for="password">Mot de passe</label>
                            <div class="control has-icons-left">
                                <input class="input" type="password" id="password" name="password" 
                                       placeholder="Votre mot de passe" required aria-required="true">
                                <span class="icon is-small is-left">
                                    <i class="fas fa-lock" aria-hidden="true"></i>
                                </span>
                            </div>
                        </div>
                        
                        <div class="field">
                            <div class="control">
                                <label class="checkbox">
                                    <input type="checkbox" name="remember" id="remember">
                                    <span class="ml-2">Se souvenir de moi</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="field">
                            <div class="control">
                                <button type="submit" class="button is-primary is-fullwidth">
                                    <span class="icon">
                                        <i class="fas fa-sign-in-alt" aria-hidden="true"></i>
                                    </span>
                                    <span>Se connecter</span>
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <div class="has-text-centered mt-4">
                        <p class="is-size-7">
                            <a href="{{ url_for('index') }}">Retour à l'accueil</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
