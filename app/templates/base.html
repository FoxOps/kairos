<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Leviia{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    
    <!-- Bulma CSS - Utilisation du CDN pour éviter les problèmes de chemins -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <!-- Font Awesome - Utilisation du CDN pour éviter les problèmes de chemins -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS de l'application -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base-styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-theme.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Skip link pour l'accessibilité -->
    <a href="#main-content" class="skip-link">Sauter la navigation</a>
    
    <header>
        <nav class="navbar is-primary is-fixed-top" role="navigation" aria-label="Navigation principale">
            <div class="navbar-brand">
                <a class="navbar-item" href="{{ url_for('index') }}" aria-label="Accueil - Leviia"><strong>Leviia</strong></a>
            </div>
            <div class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item" href="{{ url_for('user_dashboard') }}" aria-label="Tableau de bord">
                        <i class="fas fa-tachometer-alt" aria-hidden="true"></i>&nbsp; Tableau de bord
                    </a>
                    <a class="navbar-item" href="{{ url_for('schedule') }}" aria-label="Shifts">
                        <i class="fas fa-calendar-alt" aria-hidden="true"></i>&nbsp; Shifts
                    </a>
                    <a class="navbar-item" href="{{ url_for('oncall') }}" aria-label="Astreintes">
                        <i class="fas fa-moon" aria-hidden="true"></i>&nbsp; Astreintes
                    </a>
                    <a class="navbar-item" href="{{ url_for('leave') }}" aria-label="Congés">
                        <i class="fas fa-umbrella-beach" aria-hidden="true"></i>&nbsp; Congés
                    </a>
                    {% if current_user.is_authenticated and current_user.is_admin %}
                    <a class="navbar-item" href="{{ url_for('list_users') }}" aria-label="Utilisateurs">
                        <i class="fas fa-users" aria-hidden="true"></i>&nbsp; Utilisateurs
                    </a>
                    <a class="navbar-item" href="{{ url_for('admin_dashboard') }}" aria-label="Admin">
                        <i class="fas fa-cog" aria-hidden="true"></i>&nbsp; Admin
                    </a>
                    {% endif %}
                </div>
                <div class="navbar-end">
