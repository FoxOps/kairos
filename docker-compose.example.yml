# Exemple de configuration Docker Compose pour Leviia Schedule.
#
# Pour l'utiliser:
# 1. Copiez ce fichier en docker-compose.yml
# 2. Copiez .env.example en .env et modifiez-le selon vos besoins
#    (voir la section CONFIGURATION OIDC/SSO de .env.example pour activer
#    l'authentification OIDC - désactivée par défaut)
# 3. Lancez avec: docker compose up -d
#
# Pour un environnement de dev complet avec un faux fournisseur OIDC
# (oidc-mock) déjà câblé, voir docker/docker-compose.yml à la place.

services:
  leviia-schedule:
    image: leviia-schedule:optimized
    container_name: leviia-schedule
    ports:
      - "5000:5000"
    user: "1000:1000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - leviia-network

networks:
  leviia-network:
    driver: bridge
