version: '3.8'

# =============================================================================
# Docker Compose pour la production avec SQLite
# =============================================================================
#
# Ce fichier configure Leviia Schedule pour un environnement de production
# utilisant SQLite comme base de données.
#
# ATTENTION: SQLite n'est pas recommandé pour la production avec plusieurs
# workers Gunicorn. Utilisez plutôt PostgreSQL pour les environnements
# de production avec charge élevée.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.sqlite.yml up -d
#

services:
  web:
    # Override pour la production avec SQLite
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DEBUG_ERRORS=false
      - SQLALCHEMY_ECHO=false
      - LOG_LEVEL=WARNING
      
      # Sécurité maximale en production
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Lax
      - REMEMBER_COOKIE_SECURE=true
      - PREFERRED_URL_SCHEME=https
      - RATE_LIMIT_ENABLED=true
      - COMPRESS_ENABLED=true
      - WTF_CSRF_ENABLED=true
      
      # Configuration SQLite pour la production
      # Le fichier de base de données sera stocké dans ./data/
      - DATABASE_URL=sqlite:////app/data/production.db
      
      # Configuration des données par défaut (à changer !)
      - DEFAULT_ADMIN_EMAIL=admin@leviia.local
      - DEFAULT_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changez-moi}
      - DEFAULT_GROUP_NAME=Defaut
    
    # Utiliser Gunicorn comme serveur WSGI pour la production
    # Avec SQLite, on limite à 1 worker pour éviter les problèmes de verrouillage
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --threads 4 --timeout 120 --log-level info run:app
    
    # Monter le volume pour la persistance de la base de données SQLite
    volumes:
      - ./data:/app/data
    
    # Limiter les ressources
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================================================
  # Redis pour le cache (optionnel)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: leviia-schedule-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ===========================================================================
# Volumes pour la production avec SQLite
# ===========================================================================
volumes:
  redis_data:
    driver: local

# ===========================================================================
# Réseau (hérité du fichier principal)
# ===========================================================================
networks:
  leviia-network:
    external: true
