version: '3.8'

# =============================================================================
# Docker Compose pour la production
# =============================================================================
#
# Ce fichier étend docker-compose.yml pour la production.
# Il configure l'application pour un environnement sécurisé et performant.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#

services:
  web:
    # Override pour la production
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DEBUG_ERRORS=false
      - SQLALCHEMY_ECHO=false
      - LOG_LEVEL=WARNING
      
      # Sécurité maximale en production
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Lax
      - REMEMBER_COOKIE_SECURE=true
      - PREFERRED_URL_SCHEME=https
      - RATE_LIMIT_ENABLED=true
      - COMPRESS_ENABLED=true
      - WTF_CSRF_ENABLED=true
      
      # Configuration PostgreSQL pour la production
      - DATABASE_URL=postgresql://leviia:leviia-pass@db:5432/leviia
      
      # Configuration du cache Redis
      - CACHE_TYPE=RedisCache
      - CACHE_REDIS_URL=redis://redis:6379/0
      
      # Configuration des données par défaut (à changer !)
      - DEFAULT_ADMIN_EMAIL=admin@leviia.local
      - DEFAULT_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changez-moi}
    
    # Utiliser Gunicorn comme serveur WSGI pour la production
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 --timeout 120 --log-level info run:app
    
    # Limiter les ressources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Configuration pour le reverse proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.leviia.rule=Host(`leviia.example.com`)"
      - "traefik.http.routers.leviia.entrypoints=websecure"
      - "traefik.http.routers.leviia.tls=true"
      - "traefik.http.services.leviia.loadbalancer.server.port=5000"

  # ===========================================================================
  # Nginx comme reverse proxy (optionnel)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: leviia-schedule-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - leviia-network
    profiles:
      - nginx

  # ===========================================================================
  # Backup automatique de la base de données
  # ===========================================================================
  backup:
    image: postgres:15-alpine
    container_name: leviia-schedule-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=leviia
      - POSTGRES_PASSWORD=leviia-pass
      - POSTGRES_DB=leviia
    volumes:
      - ./backups:/backups
    command: >
      sh -c 'while true; do 
        pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER -d $$POSTGRES_DB > /backups/leviia-$$(date +%Y%m%d-%H%M%S).sql && 
        find /backups -type f -mtime +7 -delete && 
        sleep 86400; 
      done'
    networks:
      - leviia-network
    profiles:
      - backup

# ===========================================================================
# Volumes pour la production
# ===========================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/postgres
      o: bind
  redis_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/redis
      o: bind

# ===========================================================================
# Réseau (hérité du fichier principal)
# ===========================================================================
networks:
  leviia-network:
    external: true
