version: '3.8'

# =============================================================================
# Docker Compose pour Leviia Schedule
# =============================================================================
#
# Ce fichier permet de déployer Leviia Schedule avec tous ses services
# dépendants (base de données, Redis, etc.) en une seule commande.
#
# Usage:
#   Développement: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Production:    docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Pour arrêter: docker-compose down
# Pour voir les logs: docker-compose logs -f
#

services:
  # ===========================================================================
  # Service principal de l'application
  # ===========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leviia-schedule-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Configuration de base
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-changez-moi-en-production}
      
      # Base de données (par défaut: PostgreSQL)
      - DATABASE_URL=${DATABASE_URL:-postgresql://leviia:leviia-pass@db:5432/leviia}
      
      # Configuration des logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      
      # Sécurité
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SESSION_COOKIE_HTTPONLY=${SESSION_COOKIE_HTTPONLY:-true}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      
      # Rate limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_DEFAULT=${RATE_LIMIT_DEFAULT:-200 per day, 50 per hour}
      
      # Compression
      - COMPRESS_ENABLED=${COMPRESS_ENABLED:-true}
      
      # Données par défaut
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@leviia.local}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
      - DEFAULT_GROUP_NAME=${DEFAULT_GROUP_NAME:-Defaut}
    volumes:
      # Persistance des données (SQLite) et logs
      - ./data:/app/data
      - ./logs:/app/logs
      # Pour le développement: monter le code source
      - .:/app:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Base de données PostgreSQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: leviia-schedule-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-leviia}
      - POSTGRES_USER=${POSTGRES_USER:-leviia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leviia-pass}
    volumes:
      # Persistance des données PostgreSQL
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leviia -d leviia"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ===========================================================================
  # Redis pour le cache (optionnel)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: leviia-schedule-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"

# ===========================================================================
# Volumes pour la persistance des données
# ===========================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===========================================================================
# Réseau dédié
# ===========================================================================
networks:
  leviia-network:
    driver: bridge
