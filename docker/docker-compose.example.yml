# Example Docker Compose configuration for Kairos - recommended method,
# using the pre-built image from the registry (no repo clone, no local
# build).
#
# To use it:
# 1. Copy this file to docker-compose.yml
# 2. Copy docker/.env.example (not the .env.example at the repo root,
#    that one is for running outside Docker) to .env and edit it as
#    needed (KAIROS_IMAGE, SECRET_KEY, DEFAULT_ADMIN_PASSWORD at a
#    minimum - see the OIDC/SSO CONFIGURATION section to enable OIDC
#    authentication - disabled by default)
# 3. Run with: docker compose up -d
#
# For a full dev environment (local build, optional fake OIDC provider
# to test the SSO flow) see docker/docker-compose.yml instead, in a
# clone of the repo.

services:
  kairos:
    image: ${KAIROS_IMAGE:-ghcr.io/foxops/kairos:latest}
    container_name: kairos
    ports:
      - "5000:5000"
    user: "1000:1000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - kairos-network

networks:
  kairos-network:
    driver: bridge
