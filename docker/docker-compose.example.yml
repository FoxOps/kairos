# Exemple de configuration Docker Compose pour Kairos - méthode
# recommandée, image déjà construite sur le registry (pas de clone du
# dépôt, pas de build local).
#
# Pour l'utiliser:
# 1. Copiez ce fichier en docker-compose.yml
# 2. Copiez docker/.env.example (pas le .env.example à la racine du
#    dépôt, celui-ci est pour un lancement hors Docker) en .env et
#    modifiez-le selon vos besoins (KAIROS_IMAGE, SECRET_KEY,
#    DEFAULT_ADMIN_PASSWORD au minimum - voir la section CONFIGURATION
#    OIDC/SSO pour activer l'authentification OIDC - désactivée par défaut)
# 3. Lancez avec: docker compose up -d
#
# Pour un environnement de dev complet (build local, faux fournisseur
# OIDC optionnel pour tester le flux SSO) voir docker/docker-compose.yml
# à la place, dans un clone du dépôt.

services:
  kairos:
    image: ${KAIROS_IMAGE:-harbor.leviia.com/<HARBOR_PROJECT>/kairos:latest}
    container_name: kairos
    ports:
      - "5000:5000"
    user: "1000:1000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - kairos-network

networks:
  kairos-network:
    driver: bridge
