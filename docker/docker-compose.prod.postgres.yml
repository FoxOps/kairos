version: '3.8'

# =============================================================================
# Docker Compose pour la production avec PostgreSQL
# =============================================================================
#
# Ce fichier configure Leviia Schedule pour un environnement de production
# utilisant PostgreSQL comme base de données.
#
# PostgreSQL est recommandé pour la production, surtout avec plusieurs
# workers Gunicorn.
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.postgres.yml up -d
#

services:
  web:
    # Override pour la production avec PostgreSQL
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DEBUG_ERRORS=false
      - SQLALCHEMY_ECHO=false
      - LOG_LEVEL=WARNING
      
      # Sécurité maximale en production
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - SESSION_COOKIE_SAMESITE=Lax
      - REMEMBER_COOKIE_SECURE=true
      - PREFERRED_URL_SCHEME=https
      - RATE_LIMIT_ENABLED=true
      - COMPRESS_ENABLED=true
      - WTF_CSRF_ENABLED=true
      
      # Configuration PostgreSQL pour la production
      - DATABASE_URL=postgresql://leviia:${POSTGRES_PASSWORD:-leviia-pass}@db:5432/leviia
      
      # Configuration du cache Redis
      - CACHE_TYPE=RedisCache
      - CACHE_REDIS_URL=redis://redis:6379/0
      
      # Configuration des données par défaut (à changer !)
      - DEFAULT_ADMIN_EMAIL=admin@leviia.local
      - DEFAULT_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changez-moi}
      - DEFAULT_GROUP_NAME=Defaut
    
    # Limiter les ressources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================================================
  # Base de données PostgreSQL
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: leviia-schedule-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-leviia}
      - POSTGRES_USER=${POSTGRES_USER:-leviia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leviia-pass}
    volumes:
      # Persistance des données PostgreSQL
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leviia -d leviia"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ===========================================================================
  # Redis pour le cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: leviia-schedule-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - leviia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ===========================================================================
# Volumes pour la production avec PostgreSQL
# ===========================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===========================================================================
# Réseau (hérité du fichier principal)
# ===========================================================================
networks:
  leviia-network:
    external: true
