version: '3.8'

services:
  web:
    environment:
      - FLASK_ENV=production
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - RATE_LIMIT_ENABLED=true
      - COMPRESS_ENABLED=true
      - DEFAULT_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changez-moi}
    depends_on:
      - db
    volumes:
      - ../data:/app/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  db:
    image: postgres:15-alpine
    container_name: leviia-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-leviia}
      - POSTGRES_USER=${POSTGRES_USER:-leviia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leviia-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leviia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leviia -d leviia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leviia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - leviia-net

volumes:
  postgres_data:
  redis_data:

networks:
  leviia-net:
    external: true
