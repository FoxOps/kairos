services:
  kairos:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # KAIROS_IMAGE (in docker/.env) points to the registry image for
    # `docker compose up -d --no-build` (recommended method, see
    # Docs/deployment/docker.md); defaults to the local tag used by
    # `docker compose build` (dev alternative, local build).
    image: ${KAIROS_IMAGE:-kairos:dev}
    container_name: kairos
    ports:
      - "5000:5000"
    user: "1000:1000"
    # Everything goes through docker/.env (no environment: block here) -
    # see Docs/deployment/docker.md for the Docker-specific values to put
    # there (notably DATABASE_URL, TALISMAN_FORCE_HTTPS, FLASK_ENV).
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - kairos-network

  # Optional test OIDC provider - only started with
  # `docker compose --profile oidc-mock up -d` (local dev/test of the SSO
  # flow, see Docs/deployment/docker.md). No dependency from kairos: a
  # normal `docker compose up -d` doesn't start it.
  oidc-mock:
    profiles:
      - oidc-mock
    container_name: oidc-mock
    image: ghcr.io/soluto/oidc-server-mock:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": { "ShowKeySet": true },
          "Authentication": {
            "CookieSameSiteMode": "Lax",
            "CheckSessionCookieSameSiteMode": "Lax"
          },
          "KeyManagement": {
            "Enabled": false
          }
        }
      LOGIN_OPTIONS_INLINE: |-
        { "AllowRememberLogin": true }
      LOGOUT_OPTIONS_INLINE: |-
        { "AutomaticRedirectAfterSignOut": true }
      USERS_CONFIGURATION_INLINE: |
        [
          {
            "SubjectId": "1",
            "Username": "admin",
            "Password": "admin123",
            "Claims": [
              {"Type": "name", "Value": "Admin User", "ValueType": "string"},
              {"Type": "email", "Value": "admin@kairos.local", "ValueType": "string"},
              {"Type": "role", "Value": "user", "ValueType": "string"}
            ]
          },
          {
            "SubjectId": "2",
            "Username": "benjamin",
            "Password": "admin123",
            "Claims": [
              {"Type": "name", "Value": "Benjamin", "ValueType": "string"},
              {"Type": "email", "Value": "benjamin@kairos.local", "ValueType": "string"},
            ]
          },
          {
            "SubjectId": "3",
            "Username": "morgan",
            "Password": "admin123",
            "Claims": [
              {"Type": "name", "Value": "Morgan", "ValueType": "string"},
              {"Type": "email", "Value": "morgan@kairos.local", "ValueType": "string"},
            ]
          },
          {
            "SubjectId": "4",
            "Username": "pierre",
            "Password": "admin123",
            "Claims": [
              {"Type": "name", "Value": "Pierre", "ValueType": "string"},
              {"Type": "email", "Value": "pierre@kairos.local", "ValueType": "string"},
            ]
          },
          {
            "SubjectId": "5",
            "Username": "julien",
            "Password": "admin123",
            "Claims": [
              {"Type": "name", "Value": "Julien", "ValueType": "string"},
              {"Type": "email", "Value": "julien@kairos.local", "ValueType": "string"},
            ]
          }
        ]
      CLIENTS_CONFIGURATION_INLINE: |
        [
          {
            "ClientId": "kairos-app",
            "ClientSecrets": ["kairos-secret"],
            "AllowedGrantTypes": ["authorization_code"],
            "RequirePkce": false,
            "AllowAccessTokensViaBrowser": true,
            "RedirectUris": ["http://localhost:5000/oidc/callback"],
            "PostLogoutRedirectUris": ["http://localhost:5000"],
            "AllowedScopes": ["openid", "profile", "email"]
          }
        ]
      IDENTITY_SERVER_OPTIONS_INLINE: |
        {
          "IssuerUri": "http://192.168.1.169:8080"
        }
    networks:
      - kairos-network

networks:
  kairos-network:
    driver: bridge
