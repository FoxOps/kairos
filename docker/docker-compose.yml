# =============================================================================
# Leviia Schedule - docker-compose.yml
# =============================================================================
#
# Ce fichier permet de déployer Leviia Schedule avec Docker Compose.
#
# Configuration par défaut:
# - Application Flask avec Gunicorn
# - Base de données PostgreSQL (optionnelle, service externe)
# - Volume persistant pour les données
#
# PostgreSQL est géré comme un service externe et n'est PAS inclus dans l'image Docker.
#
# Utilisation (depuis le dossier docker/) :
#   # Démarrer tous les services (avec PostgreSQL)
#   docker-compose up -d
#
#   # Démarrer uniquement l'application (avec SQLite)
#   docker-compose up -d app
#
#   # Arrêter tous les services
#   docker-compose down
#
#   # Voir les logs
#   docker-compose logs -f app
#
#   # Reconstruire les images
#   docker-compose build --no-cache
#
# Utilisation (depuis la racine du projet) :
#   docker-compose -f docker/docker-compose.yml up -d
#
# =============================================================================

version: '3.8'

# =============================================================================
# Services
# =============================================================================

services:
  # ===========================================================================
  # Application Leviia Schedule
  # ===========================================================================
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: leviia-schedule-app
    restart: unless-stopped
    
    # Configuration du réseau
    networks:
      - leviia-network
    
    # Ports exposés
    ports:
      - "${LEVIIA_PORT:-5000}:5000"
    
    # Variables d'environnement
    environment:
      # Configuration Flask
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      SERVER: ${SERVER:-gunicorn}
      
      # Clé secrète (GÉNÉREZ-EN UNE NOUVELLE POUR LA PRODUCTION!)
      SECRET_KEY: ${SECRET_KEY:-ta-cle-secrete-changez-la-en-production}
      
      # Configuration de la base de données
      # Par défaut: PostgreSQL (si le service db est démarré)
      # Pour utiliser SQLite: DATABASE_URL=sqlite:////app/data/app.db
      DATABASE_URL: ${DATABASE_URL:-postgresql://leviia:leviia-pass@db:5432/leviia}
      SQLALCHEMY_TRACK_MODIFICATIONS: ${SQLALCHEMY_TRACK_MODIFICATIONS:-false}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      
      # Configuration Gunicorn (si SERVER=gunicorn)
      GUNICORN_BIND: ${GUNICORN_BIND:-0.0.0.0:5000}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
      
      # Configuration Flask (si SERVER=flask)
      FLASK_HOST: ${FLASK_HOST:-0.0.0.0}
      FLASK_PORT: ${FLASK_PORT:-5000}
      
      # Configuration des données par défaut
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@leviia.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_GROUP_NAME: ${DEFAULT_GROUP_NAME:-Défaut}
      DEFAULT_GROUP_IN_SCHEDULE: ${DEFAULT_GROUP_IN_SCHEDULE:-true}
      DEFAULT_GROUP_IN_ONCALL: ${DEFAULT_GROUP_IN_ONCALL:-true}
      
      # Configuration du logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_FILE_APP: ${LOG_FILE_APP:-leviia-app.log}
      LOG_FILE_ERRORS: ${LOG_FILE_ERRORS:-leviia-errors.log}
      
      # Configuration de la sécurité
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_HTTPONLY: ${SESSION_COOKIE_HTTPONLY:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      
      # Rate limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-200 per day, 50 per hour}
      
      # Compression
      COMPRESS_ENABLED: ${COMPRESS_ENABLED:-true}
      
      # CSRF Protection
      WTF_CSRF_ENABLED: ${WTF_CSRF_ENABLED:-true}
      
      # Timezone (optionnel)
      TZ: ${TZ:-UTC}
    
    # Volumes pour la persistance des données
    volumes:
      # Données de l'application (SQLite, uploads, etc.)
      - leviia-data:/app/data
      # Fichiers de log
      - leviia-logs:/app/logs
      # Instance Flask (pour SQLite si utilisé)
      - leviia-instance:/app/instance
    
    # Dépendances (attendre que la base de données soit prête si PostgreSQL)
    depends_on:
      db:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Limites de ressources (optionnel)
    deploy:
      resources:
        limits:
          memory: ${LEVIIA_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${LEVIIA_MEMORY_RESERVATION:-256M}
    
    # Options de sécurité
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ===========================================================================
  # Base de données PostgreSQL (SERVICE EXTERNE - OPTIONNEL)
  # ===========================================================================
  # Ce service est optionnel. Vous pouvez utiliser SQLite à la place
  # en configurant DATABASE_URL=sqlite:////app/data/app.db dans .env
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: leviia-schedule-db
    restart: unless-stopped
    
    # Configuration du réseau
    networks:
      - leviia-network
    
    # Variables d'environnement pour PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leviia}
      POSTGRES_USER: ${POSTGRES_USER:-leviia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leviia-pass}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--encoding=UTF8 --data-checksums}
      
      # Timezone
      TZ: ${TZ:-UTC}
    
    # Volumes pour la persistance des données PostgreSQL
    volumes:
      - leviia-postgres-data:/var/lib/postgresql/data
    
    # Ports exposés (optionnel, pour accès externe)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leviia} -d ${POSTGRES_DB:-leviia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Limites de ressources
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-256M}
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVATION:-128M}
    
    # Options de sécurité
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # ===========================================================================
  # Redis (SERVICE EXTERNE - OPTIONNEL)
  # ===========================================================================
  # Ce service est optionnel pour le cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: leviia-schedule-redis
    restart: unless-stopped
    
    networks:
      - leviia-network
    
    # Configuration Redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    
    # Volumes pour la persistance
    volumes:
      - leviia-redis-data:/data
    
    # Ports exposés
    ports:
      - "${REDIS_PORT:-6379}:6379"
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    
    # Limites de ressources
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-64M}
    
    # Options de sécurité
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

# =============================================================================
# Volumes
# =============================================================================

volumes:
  leviia-data:
    driver: local
    name: leviia-schedule-data
  
  leviia-logs:
    driver: local
    name: leviia-schedule-logs
  
  leviia-instance:
    driver: local
    name: leviia-schedule-instance
  
  leviia-postgres-data:
    driver: local
    name: leviia-schedule-postgres-data
  
  leviia-redis-data:
    driver: local
    name: leviia-schedule-redis-data

# =============================================================================
# Réseaux
# =============================================================================

networks:
  leviia-network:
    driver: bridge
    name: leviia-schedule-network
