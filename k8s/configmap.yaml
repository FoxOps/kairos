apiVersion: v1
kind: ConfigMap
metadata:
  name: kairos-config
  namespace: kairos
  labels:
    app: kairos
data:
  # Flask configuration
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"

  # Database configuration
  # Note: DATABASE_URL must be in the secrets
  SQLALCHEMY_TRACK_MODIFICATIONS: "0"

  # Cache configuration
  CACHE_TYPE: "SimpleCache"
  CACHE_DEFAULT_TIMEOUT: "3600"

  # Rate limiting configuration
  RATE_LIMIT_ENABLED: "1"
  RATE_LIMIT_DEFAULT: "200 per day, 50 per hour"

  # Logging configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # ICS export configuration
  ICS_EXPORT_ENABLED: "1"
  ICS_TOKEN_EXPIRY_DAYS: "365"

  # On-call configuration
  ONCALL_ROTATION_DAYS: "7"
  ONCALL_ROTATION_TIME: "21:00"

  # Shift configuration
  SHIFT_DEFAULT_DURATION: "8"

  # CORS configuration
  CORS_ORIGINS: "*"

  # Server configuration
  PORT: "5000"
  WORKERS: "4"
  THREADS: "2"
  TIMEOUT: "120"

  # OIDC configuration (example, adapt as needed)
  OIDC_ENABLED: "0"
  # OIDC_ISSUER: "https://keycloak.example.com/auth/realms/kairos"
  # OIDC_CLIENT_ID: "kairos"
  # OIDC_CLIENT_SECRET: ""  # In the secrets
  # OIDC_REDIRECT_URI: "https://schedule.example.com/auth/callback"
