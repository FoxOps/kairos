apiVersion: apps/v1
kind: Deployment
metadata:
  name: leviia-schedule
  namespace: leviia-schedule
  labels:
    app: leviia-schedule
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leviia-schedule
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: leviia-schedule
        version: v1
      annotations:
        # Recharger le pod si le configmap ou le secret change
        checksum/config: "{{ include (print `k8s/configmap.yaml`) | sha256sum }}"
        checksum/secret: "{{ include (print `k8s/secret.yaml`) | sha256sum }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: leviia-schedule
        image: your-registry/leviia-schedule:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: leviia-config
        - secretRef:
            name: leviia-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: instance
          mountPath: /app/instance
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: leviia-data
      - name: logs
        emptyDir: {}
      - name: instance
        emptyDir: {}
      # Si vous utilisez un registry privé
      # imagePullSecrets:
      # - name: regcred
