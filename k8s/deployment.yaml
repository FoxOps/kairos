apiVersion: apps/v1
kind: Deployment
metadata:
  name: leviia-schedule
  namespace: leviia-schedule
  labels:
    app: leviia-schedule
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leviia-schedule
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: leviia-schedule
        version: v1
      # Pas d'annotations checksum/config-secret ici : ce manifest est
      # appliqué tel quel via `kubectl apply -f k8s/` (voir .gitlab-ci.yml,
      # job deploy_production), pas via Helm - la syntaxe `{{ include ... }}`
      # qui existait avant n'était jamais interprétée, c'était du texte
      # littéral dans l'annotation, donc le rolling restart automatique sur
      # changement de ConfigMap/Secret ne s'est jamais produit. Si besoin,
      # déclencher `kubectl rollout restart deployment/leviia-schedule -n
      # leviia-schedule` explicitement en CI après un changement de config.
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: leviia-schedule
        # Placeholder remplacé en CI (voir .gitlab-ci.yml, job
        # deploy_production) par $CI_REGISTRY_IMAGE:latest avant `kubectl
        # apply` - l'image réellement poussée par build_docker. Pour un
        # apply manuel hors CI, remplacer par le registre réel avant usage.
        image: your-registry/leviia-schedule:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: leviia-config
        - secretRef:
            name: leviia-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: instance
          mountPath: /app/instance
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: leviia-data
      - name: logs
        emptyDir: {}
      - name: instance
        emptyDir: {}
      # Si vous utilisez un registry privé
      # imagePullSecrets:
      # - name: regcred
