apiVersion: apps/v1
kind: Deployment
metadata:
  name: kairos
  namespace: kairos
  labels:
    app: kairos
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kairos
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kairos
        version: v1
      # No checksum/config-secret annotations here: this manifest is
      # applied as-is via `kubectl apply -f k8s/` (see .gitlab-ci.yml,
      # deploy_production job), not via Helm - the `{{ include ... }}`
      # syntax that used to be here was never interpreted, it was literal
      # text in the annotation, so the automatic rolling restart on
      # ConfigMap/Secret change never actually happened. If needed,
      # trigger `kubectl rollout restart deployment/kairos -n kairos`
      # explicitly in CI after a config change.
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: kairos
        # Placeholder replaced in CI (see .gitlab-ci.yml, deploy_production
        # job) with $CI_REGISTRY_IMAGE:latest before `kubectl apply` - the
        # image actually pushed by build_docker. For a manual apply outside
        # CI, replace with the real registry before use.
        image: your-registry/kairos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: kairos-config
        - secretRef:
            name: kairos-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        - name: instance
          mountPath: /app/instance
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kairos-data
      - name: logs
        emptyDir: {}
      - name: instance
        emptyDir: {}
      # If you're using a private registry
      # imagePullSecrets:
      # - name: regcred
