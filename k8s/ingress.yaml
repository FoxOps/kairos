apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kairos
  namespace: kairos
  labels:
    app: kairos
  annotations:
    # Annotations for the Ingress controller
    # Example for Nginx Ingress Controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # To enable HTTPS (requires cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # For Traefik
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"

    # For HAProxy
    # haproxy.org/ssl-passthrough: "true"
    # haproxy.org/backend-config-snippet: |
    #   timeout server 600s

    # For AWS ALB
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # Redirect HTTP to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security configuration
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

spec:
  ingressClassName: nginx
  rules:
  - host: schedule.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kairos
            port:
              number: 80

  # TLS configuration (uncomment if you have certificates)
  # tls:
  # - hosts:
  #   - schedule.yourdomain.com
  #   secretName: kairos-tls

---
# Ingress for the API (optional, if you want to separate the API)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kairos-api
  namespace: kairos
  labels:
    app: kairos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"

spec:
  ingressClassName: nginx
  rules:
  - host: api.schedule.yourdomain.com
    http:
      paths:
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: kairos
            port:
              number: 80
