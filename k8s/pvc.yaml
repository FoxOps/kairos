apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kairos-data
  namespace: kairos
  labels:
    app: kairos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
  # For environments with specific storage classes
  # storageClassName: gp2 (AWS EBS)
  # storageClassName: standard (GKE)
  # storageClassName: managed-premium (Azure)

---
# PersistentVolumeClaim for logs (optional)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kairos-logs
  namespace: kairos
  labels:
    app: kairos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  storageClassName: standard
