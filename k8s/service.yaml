apiVersion: v1
kind: Service
metadata:
  name: kairos
  namespace: kairos
  labels:
    app: kairos
spec:
  selector:
    app: kairos
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: ClusterIP

---
# Service pour accéder depuis l'extérieur du cluster (optionnel)
apiVersion: v1
kind: Service
metadata:
  name: kairos-external
  namespace: kairos
  labels:
    app: kairos
spec:
  selector:
    app: kairos
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: LoadBalancer
  # Pour les clouds qui supportent LoadBalancer
  # type: NodePort
  # Pour Minikube, utiliser NodePort
